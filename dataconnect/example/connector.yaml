      package: "@dataconnect/admin-generated"
      packageJsonDir: ..\..\backend\]
    - outputDir: ..\..\backend\functions\src\dataconnect-admin-generated
      package: "@dataconnect/admin-generated"
      packageJsonDir: ..\..\backend\functions
